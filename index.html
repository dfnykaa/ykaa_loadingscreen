<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Ykaa Loading Screen</title>
</head>
<body>
    <div id="bg"></div>
    <div class="overlay"></div>

    <div class="interface">
        <div class="controls-wrapper">
            <div class="glass-box">
                <div class="box-header">SONG MENU</div>
                <div class="control-rows">
                    <div class="row"><span>NEXT</span> <kbd>→</kbd></div>
                    <div class="row"><span>PREVIOUS</span> <kbd>←</kbd></div>
                    <div class="row"><span>PAUSE</span> <kbd>SPACE</kbd></div>
                </div>
                <div class="divider"></div>
                <div class="player-info">
                    <p class="mini-label">NOW PLAYING</p>
                    <p id="artist-name">LOADING...</p>
                    <p id="song-name">PLEASE WAIT</p>
                </div>
            </div>
        </div>

        <div class="footer-area">
            <div class="welcome-pill">
                <span class="dot"></span> <span id="changing-tip">Welcome to the server! Please read the rules before joining!</span>
            </div>
            
            <div class="loading-container">
                <div class="progress-info">
                    <span id="load-status">JOINING TO SERVER...</span>
                    <span id="progress-val">0%</span>
                </div>
                <div class="progress-track">
                    <div id="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
